{id:"market",name:"Walk the Dirt",icon:"🔍",weeks:[1,4],

{id:"zoning",name:"Get the Green Light",icon:"🏛️",weeks:[4,26],

{id:"design",name:"Draw It Up",icon:"📐",weeks:[8,16],
 summary:"Vision meets blueprint. Every material choice, every floor plan tweak, every system decision you lock down now saves you money and headaches on the job site.",
 education:"Design is where you win or lose the deal. Revisit your pro forma—if you made concessions during entitlements (fewer units, more parking), does the deal still work? Then perfect floor plans through multiple iterations. MEP systems (mechanical, electrical, plumbing) are 20-30% of your budget—use a design-build approach where the GC manages the MEP subs for better accountability. Space efficiency is money: a standard building runs 110% gross SF to buildable, 90% net sellable. Optimized design hits 108% gross, 92% net—that 4-point improvement on a 140-unit building can mean 15+ additional units without adding building envelope. Smaller, more efficient units at slightly higher price-per-SF actually sell faster and expand your buyer pool. Right-size your amenities too—amenity bloat drives up HOA costs and kills absorption.",

{id:"construction-docs",name:"Blueprint It",icon:"📋",weeks:[8,12],

{id:"pro-forma",name:"The Scoreboard",icon:"📊",weeks:[1,52],
 summary:"This is your project's vital signs monitor. It never stops updating. Every cost, every rent assumption, every financing term—it all lives here. If you're not checking this weekly, you're flying blind.",
 education:"Your pro forma tracks everything: land cost, hard costs, soft costs (A&E, legal, permits, marketing), financing costs, and projected revenue. Key metrics to watch: Yield on Cost (stabilized NOI / total project cost), Cash-on-Cash Return, and Debt Service Coverage Ratio (DSCR). If Yield on Cost exceeds the market cap rate, you’re creating value. Warning: most pro formas are missing 15-20% of actual costs. Commonly forgotten soft costs include: builder’s risk insurance ($200-400K), traffic studies ($30-60K), lender fees ($75-150K), project management (3-5% of costs), and pre-opening operating expenses (3-6 months). Budget contingency at 15% of hard costs and 10% of soft costs during planning, then tighten to 2-5% through construction as unknowns shrink. Plan the refinance into your deal structure from day one. Successful deals should return 100% of investor capital through a stabilized refi while you retain ownership and ongoing cash flow. Construction loan interest typically runs 5-6% of total construction cost — don’t forget to model it.",

/* ═══════════════════════════════════════════════════════════════════════════
   PHASE DEPENDENCIES & CRITICAL PATH
   ═══════════════════════════════════════════════════════════════════════════ */
// deps: phases that must be complete before this one can start
// parallel: phases that typically run concurrently with this one
const DEPS={
  "market":        {deps:[],parallel:["napkin-math"]},
  "napkin-math":   {deps:["market"],parallel:["market"]},
  "research":      {deps:["napkin-math"],parallel:[]},
  "loi":           {deps:["research"],parallel:[]},
  "purchase-agreement":{deps:["loi"],parallel:[]},
  "due-diligence": {deps:["purchase-agreement"],parallel:["zoning","tenancy"]},
  "zoning":        {deps:["purchase-agreement"],parallel:["due-diligence","design"]},
  "design":        {deps:["due-diligence"],parallel:["zoning","construction-docs"]},
  "construction-docs":{deps:["design"],parallel:["find-gc"]},
  "find-gc":       {deps:["design"],parallel:["construction-docs"]},
  "pro-forma":     {deps:["napkin-math"],parallel:[]},
  "capital-stack": {deps:["pro-forma","find-gc"],parallel:[]},
  "tenancy":       {deps:["purchase-agreement"],parallel:["due-diligence"]},
  "closing":       {deps:["due-diligence","capital-stack","zoning"],parallel:[]},
  "construction":  {deps:["closing","find-gc","construction-docs"],parallel:["branding"]},
  "branding":      {deps:["design"],parallel:["construction"]},
  "lease-up":      {deps:["branding","construction"],parallel:[]},
  "property-mgmt": {deps:["lease-up"],parallel:[]},
  "asset-mgmt":    {deps:["property-mgmt"],parallel:[]}
};

// The critical path: the longest chain of sequential dependencies that determines project duration
const CRITICAL_PATH=["market","napkin-math","research","loi","purchase-agreement","due-diligence","design","construction-docs","find-gc","capital-stack","closing","construction","lease-up","property-mgmt","asset-mgmt"];

function getPhaseStatus(phaseId,phaseTotals,checked){
  const dep=DEPS[phaseId];
  if(!dep)return{status:"ready",blockers:[]};
  const blockers=[];
  for(const d of dep.deps){
    const t=phaseTotals[d];
    if(t&&t.total>0&&t.done<t.total){
      const p=PHASES.find(x=>x.id===d);
      blockers.push(p?p.name:d);
    }
  }
  if(blockers.length>0)return{status:"blocked",blockers};
  return{status:"ready",blockers:[]};
}

function fmt(n){if(n==null||isNaN(n))return"$0";return"$"+Number(n).toLocaleString("en-US",{maximumFractionDigits:0});}
function pct(n){if(n==null||isNaN(n))return"0%";return Number(n).toFixed(1)+"%";}

function calcFinancials(deal){
  const p=parseFloat(deal.purchasePrice)||0;
  const units=parseInt(deal.unitCount)||0;
  const rent=parseFloat(deal.avgRent)||0;
  const costPerUnit=parseFloat(deal.estimatedCostPerUnit)||0;
  const capRate=(parseFloat(deal.capRate)||5.5)/100;
  const hardCosts=parseFloat(deal.hardCosts)||0;
  const softPct=deal.softCostsPct!=null&&deal.softCostsPct!==""?(parseFloat(deal.softCostsPct)/100):0;
  const opexPct=(parseFloat(deal.annualOpexPct)||38)/100;
  const vacPct=(parseFloat(deal.vacancyPct)||5)/100;
  const otherInc=parseFloat(deal.otherMonthlyIncome)||0;
  const ltc=(parseFloat(deal.loanLTC)||65)/100;
  const rate=(parseFloat(deal.interestRate)||7.5)/100;
  const devEquity=parseFloat(deal.equityFromDeveloper)||0;

  const grossMonthly=(units*rent)+otherInc;
  const grossAnnual=grossMonthly*12;
  const effectiveGross=grossAnnual*(1-vacPct);
  const opex=effectiveGross*opexPct;
  const noi=effectiveGross-opex;

  const napkinConstruction=units*costPerUnit;
  const actualHard=hardCosts||napkinConstruction;
  const softCosts=actualHard*softPct;
  const totalProjectCost=p+actualHard+softCosts;
  const projectedValue=capRate>0?noi/capRate:0;
  const profit=projectedValue-totalProjectCost;
  const yieldOnCost=totalProjectCost>0?(noi/totalProjectCost)*100:0;

  const loanAmount=totalProjectCost*ltc;
  const equityNeeded=totalProjectCost-loanAmount;
  const annualDebtService=loanAmount*rate;
  const dscr=annualDebtService>0?noi/annualDebtService:0;
  const cashFlow=noi-annualDebtService;
  const coc=equityNeeded>0?(cashFlow/equityNeeded)*100:0;

  return{grossMonthly,grossAnnual,effectiveGross,opex,noi,totalProjectCost,actualHard,softCosts,projectedValue,profit,yieldOnCost,loanAmount,equityNeeded,annualDebtService,dscr,cashFlow,coc,devEquity};
}

function GanttChart({phases,activePhase,checked,phaseTotals,onClickPhase}){
  // Exclude long-tail phases from the chart (asset-mgmt, property-mgmt)
  const chartPhases=phases.filter(p=>p.weeks[1]<=104);
  // Position phases using cumulative offsets of minimum durations
  let cum=0;
  const positioned=[];
  for(let i=0;i<chartPhases.length;i++){
    const p=chartPhases[i];
    const dur=p.weeks[1];
    const t=phaseTotals[p.id];
    const pctDone=t&&t.total>0?Math.round((t.done/t.total)*100):0;
    const isCritical=CRITICAL_PATH.includes(p.id);
    const depStatus=getPhaseStatus(p.id,phaseTotals,checked);
    positioned.push({...p,start:cum,dur,pctDone,isCritical,depStatus});
    cum+=Math.max(p.weeks[0],1);
  }
  const maxEnd=Math.max(...positioned.map(r=>r.start+r.dur));
  const scale=maxEnd||104;
  // Tick marks every ~13 weeks
  const ticks=[];
  for(let w=0;w<=scale;w+=13)ticks.push(w);
  if(ticks[ticks.length-1]<scale)ticks.push(Math.ceil(scale));

  // Long-tail phases shown as summary row
  const longTail=phases.filter(p=>p.weeks[1]>104);

  return(
    <div style={{overflowX:"auto",padding:"0 0 8px"}}>
      {/* Legend */}
      <div style={{display:"flex",gap:16,marginBottom:10,fontSize:11,color:T.textTertiary}}>
        <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:"rgba(224,62,62,0.18)",border:"1.5px solid "+T.red,marginRight:4,verticalAlign:"middle"}}/> Critical path</span>
        <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:"rgba(35,131,226,0.25)",border:"1.5px solid "+T.accent,marginRight:4,verticalAlign:"middle"}}/> Active</span>
        <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:"rgba(15,123,15,0.3)",border:"1.5px solid "+T.green,marginRight:4,verticalAlign:"middle"}}/> Complete</span>
        <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:"rgba(0,0,0,0.06)",border:"1.5px solid #d3d3d0",marginRight:4,verticalAlign:"middle"}}/> Waiting</span>
      </div>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",padding:"0 0 8px",borderBottom:"1px solid "+T.border,marginBottom:4}}>
        <div style={{width:220,flexShrink:0,fontSize:11,fontWeight:600,color:T.textSecondary,textTransform:"uppercase",letterSpacing:"0.05em"}}>Phase</div>
        <div style={{flex:1,display:"flex",justifyContent:"space-between",fontSize:10,color:T.textTertiary,minWidth:500}}>
          {ticks.map(w=><span key={w}>Wk {w}</span>)}
        </div>
      </div>
      {positioned.map((r,i)=>{
        const isActive=activePhase===r.id;
        const leftPct=(r.start/scale)*100;
        const widthPct=(r.dur/scale)*100;
        const isBlocked=r.depStatus.status==="blocked";
        const isDone=r.pctDone===100;
        const barColor=isDone?T.green:isActive?T.accent:r.isCritical?T.red:"#d3d3d0";
        const fillColor=isDone?"rgba(15,123,15,0.3)":isActive?"rgba(35,131,226,0.25)":r.isCritical?"rgba(224,62,62,0.18)":"rgba(0,0,0,0.06)";
        const labelColor=isDone?T.green:isActive?T.accent:isBlocked?T.textTertiary:T.text;
        return(
          <div key={r.id} onClick={()=>onClickPhase(r.id)} style={{display:"flex",alignItems:"center",padding:"4px 0",cursor:"pointer",borderRadius:4,background:isActive?"rgba(35,131,226,0.04)":"transparent",opacity:isBlocked&&!isDone?0.55:1}}>
            <div style={{width:220,flexShrink:0,display:"flex",alignItems:"center",gap:4,paddingLeft:4}}>
              <span style={{fontSize:13,fontWeight:isActive?600:400,color:labelColor,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                {r.icon} {r.name}
              </span>
              {isBlocked&&!isDone&&<span title={"Waiting on: "+r.depStatus.blockers.join(", ")} style={{fontSize:10,color:T.amber,cursor:"help"}}>blocked</span>}
              {r.isCritical&&!isDone&&<span style={{fontSize:9,color:T.red,fontWeight:600,letterSpacing:"0.03em"}}>CP</span>}
            </div>
            <div style={{flex:1,position:"relative",height:22,minWidth:500}}>
              <div style={{position:"absolute",left:leftPct+"%",width:Math.max(widthPct,1)+"%",height:"100%",borderRadius:4,background:fillColor,border:"1.5px solid "+barColor,transition:"all 0.3s ease",borderStyle:isBlocked&&!isDone?"dashed":"solid"}}>
                {r.pctDone>0&&<div style={{height:"100%",width:r.pctDone+"%",background:barColor,borderRadius:3,opacity:0.5,transition:"width 0.3s ease"}}/>}
                {r.pctDone>0&&r.pctDone<100&&<span style={{position:"absolute",right:4,top:3,fontSize:9,fontWeight:600,color:barColor}}>{r.pctDone}%</span>}
              </div>
            </div>
          </div>
        );
      })}
      {/* Long-tail phases as compact summary */}
      {longTail.length>0&&(
        <div style={{marginTop:8,padding:"8px 4px",borderTop:"1px dashed "+T.border}}>
          <div style={{fontSize:11,color:T.textTertiary,marginBottom:4,fontWeight:600}}>Ongoing (post-construction)</div>
          {longTail.map(p=>{
            const t=phaseTotals[p.id];
            const pctDone=t&&t.total>0?Math.round((t.done/t.total)*100):0;
            const isActive=activePhase===p.id;
            return(
              <div key={p.id} onClick={()=>onClickPhase(p.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"3px 4px",cursor:"pointer",borderRadius:4,background:isActive?"rgba(35,131,226,0.04)":"transparent"}}>
                <span style={{fontSize:13,color:isActive?T.accent:T.text,fontWeight:isActive?600:400}}>{p.icon} {p.name}</span>
                {t&&t.total>0&&<span style={{fontSize:11,color:T.textTertiary}}>{pctDone}%</span>}
                <span style={{fontSize:11,color:T.textTertiary}}>ongoing</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function FinancialSummary({deal}){
  const f=calcFinancials(deal);
  if(!deal.unitCount&&!deal.avgRent&&!deal.purchasePrice)return null;
  const metrics=[
    {label:"Gross Monthly Revenue",value:fmt(f.grossMonthly),show:f.grossMonthly>0},
    {label:"Gross Annual Revenue",value:fmt(f.grossAnnual),show:f.grossAnnual>0},
    {label:"Net Operating Income (NOI)",value:fmt(f.noi),show:f.noi>0,highlight:true},
    {label:"Total Project Cost",value:fmt(f.totalProjectCost),show:f.totalProjectCost>0},
    {label:"Projected Value (NOI ÷ Cap Rate)",value:fmt(f.projectedValue),show:f.projectedValue>0},
    {label:"Estimated Profit / (Loss)",value:fmt(f.profit),show:f.totalProjectCost>0,color:f.profit>=0?T.green:T.red},
    {label:"Yield on Cost",value:pct(f.yieldOnCost),show:f.yieldOnCost>0,highlight:true},
    {label:"Loan Amount",value:fmt(f.loanAmount),show:f.loanAmount>0},
    {label:"Equity Needed",value:fmt(f.equityNeeded),show:f.equityNeeded>0},
    {label:"Annual Debt Service",value:fmt(f.annualDebtService),show:f.annualDebtService>0},
    {label:"DSCR",value:f.dscr.toFixed(2)+"x",show:f.dscr>0},
    {label:"Cash-on-Cash Return",value:pct(f.coc),show:f.coc!==0,color:f.coc>=0?T.green:T.red},
  ].filter(m=>m.show);
  if(metrics.length===0)return null;
  return(
    <div style={{background:T.bg,borderRadius:10,boxShadow:T.cardShadow,padding:"16px 20px",marginBottom:20}}>
      <div style={{fontSize:12,fontWeight:600,color:T.textSecondary,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:12}}>
        What the Numbers Say
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:"8px 16px"}}>
        {metrics.map(m=>(
          <div key={m.label} style={{padding:"8px 0",borderBottom:"1px solid "+T.borderLight}}>
            <div style={{fontSize:11,color:T.textTertiary}}>{m.label}</div>
            <div style={{fontSize:16,fontWeight:m.highlight?700:600,color:m.color||T.text,marginTop:2}}>{m.value}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

   PERSISTENCE HELPERS
   ═══════════════════════════════════════════════════════════════════════════ */
const LS_KEY="buildsheet";
var _lsWorks=null;
function lsOk(){
  if(_lsWorks!==null)return _lsWorks;
  try{localStorage.setItem("_test","1");localStorage.removeItem("_test");_lsWorks=true;}catch(e){_lsWorks=false;}
  return _lsWorks;
}
function loadAllData(){
  try{if(!lsOk())return null;const raw=localStorage.getItem(LS_KEY);return raw?JSON.parse(raw):null;}catch(e){return null;}
}
function saveAllData(data){
  try{if(lsOk())localStorage.setItem(LS_KEY,JSON.stringify(data));}catch(e){}
}
function newDealState(name){
  return{id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),name:name||"Untitled Deal",deal:{},checked:{},notes:{},phaseNotes:{},createdAt:new Date().toISOString()};
}
function exportDealJSON(dealState){
  const blob=new Blob([JSON.stringify(dealState,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=(dealState.name||"deal").replace(/[^a-zA-Z0-9-_ ]/g,"")+".json";
  a.click();URL.revokeObjectURL(url);
}

/* ═══════════════════════════════════════════════════════════════════════════
   MAIN APP (with multi-deal + persistence)
   ═══════════════════════════════════════════════════════════════════════════ */

function App(){
  // Email gate
  const [unlocked,setUnlocked]=useState(()=>{
    try{return lsOk()&&localStorage.getItem("buildsheet_unlocked")==="true";}catch(e){return false;}
  });

  // Multi-deal state
  const [allDeals,setAllDeals]=useState(()=>{
    const saved=loadAllData();
    if(saved&&saved.deals&&saved.deals.length>0)return saved.deals;
    return[newDealState("Deal 1")];
  });
  const [activeDealId,setActiveDealId]=useState(()=>{
    const saved=loadAllData();
    return(saved&&saved.activeDealId)||(allDeals[0]&&allDeals[0].id)||"";
  });
  const [showDealPicker,setShowDealPicker]=useState(false);
  const [editingDealName,setEditingDealName]=useState(false);

  // Current deal accessors — useMemo to prevent new refs each render
  const currentDealIdx=allDeals.findIndex(d=>d.id===activeDealId);
  const currentDealState=allDeals[currentDealIdx]||allDeals[0]||newDealState("Deal 1");

  const deal=useMemo(()=>currentDealState.deal||{},[currentDealState]);
  const checked=useMemo(()=>currentDealState.checked||EMPTY,[currentDealState]);
  const notes=useMemo(()=>currentDealState.notes||EMPTY,[currentDealState]);
  const phaseNotes=useMemo(()=>currentDealState.phaseNotes||EMPTY,[currentDealState]);

  const [activePhase,setActivePhase]=useState(PHASES[0].id);
  const [view,setView]=useState("phase");
  const [sidebarOpen,setSidebarOpen]=useState(true);
  const contentRef=useRef(null);

  // Persist to localStorage on every change
  useEffect(()=>{
    saveAllData({deals:allDeals,activeDealId});
  },[allDeals,activeDealId]);

  useEffect(()=>{if(contentRef.current)contentRef.current.scrollTop=0;},[activePhase]);

  // Update helpers that write into the current deal
  const updateCurrentDeal=useCallback((fn)=>{
    setAllDeals(prev=>prev.map(d=>d.id===activeDealId?fn(d):d));
  },[activeDealId]);

  const setDeal=useCallback(fn=>{
    updateCurrentDeal(d=>({...d,deal:typeof fn==="function"?fn(d.deal||{}):fn}));
  },[updateCurrentDeal]);
  const setChecked=useCallback(fn=>{
    updateCurrentDeal(d=>({...d,checked:typeof fn==="function"?fn(d.checked||{}):fn}));
  },[updateCurrentDeal]);
  const setNotes=useCallback(fn=>{
    updateCurrentDeal(d=>({...d,notes:typeof fn==="function"?fn(d.notes||{}):fn}));
  },[updateCurrentDeal]);
  const setPhaseNotes=useCallback(fn=>{
    updateCurrentDeal(d=>({...d,phaseNotes:typeof fn==="function"?fn(d.phaseNotes||{}):fn}));
  },[updateCurrentDeal]);

  const updateDeal=useCallback((k,v)=>setDeal(d=>({...d,[k]:v})),[setDeal]);
  const toggleCheck=useCallback(k=>setChecked(c=>({...c,[k]:!c[k]})),[setChecked]);
  const updateNote=useCallback((k,v)=>setNotes(n=>({...n,[k]:v})),[setNotes]);
  const updatePhaseNote=useCallback((pid,v)=>setPhaseNotes(n=>({...n,[pid]:v})),[setPhaseNotes]);

  // Deal management
  const createDeal=useCallback(()=>{
    const nd=newDealState("Deal "+(allDeals.length+1));
    setAllDeals(prev=>[...prev,nd]);
    setActiveDealId(nd.id);
    setShowDealPicker(false);
    setActivePhase(PHASES[0].id);
  },[allDeals.length]);

  const deleteDeal=useCallback((id)=>{
    setAllDeals(prev=>{
      const next=prev.filter(d=>d.id!==id);
      if(id===activeDealId&&next.length>0)setActiveDealId(next[0].id);
      return next;
    });
  },[activeDealId]);

  const exportDeal=useCallback((id)=>{
    const d=allDeals.find(x=>x.id===id);
    if(d)exportDealJSON(d);
  },[allDeals]);

  const importDeal=useCallback((data)=>{
    const nd={...data,id:Date.now().toString(36)+Math.random().toString(36).slice(2,6)};
    setAllDeals(prev=>[...prev,nd]);
    setActiveDealId(nd.id);
    setShowDealPicker(false);
  },[]);

  const renameDeal=useCallback((name)=>{
    updateCurrentDeal(d=>({...d,name}));
    setEditingDealName(false);
  },[updateCurrentDeal]);

  const phase=PHASES.find(p=>p.id===activePhase);
  const phaseIdx=PHASES.findIndex(p=>p.id===activePhase);

  const phaseTotals=useMemo(()=>{
    const t={};
    PHASES.forEach(p=>{
      const total=p.checklist.length+(p.guide||[]).length;
      const done=p.checklist.filter((_,i)=>checked[p.id+"-"+i]).length+(p.guide||[]).filter((_,i)=>checked[p.id+"-guide-"+i]).length;
      t[p.id]={total,done};
    });
    return t;
  },[checked]);

  const overallTotal=Object.values(phaseTotals).reduce((a,b)=>a+b.total,0);
  const overallDone=Object.values(phaseTotals).reduce((a,b)=>a+b.done,0);
  const overallPct=overallTotal>0?Math.round((overallDone/overallTotal)*100):0;

  // Group checklist by category
  const checklistCats=useMemo(()=>{
    const cats={};
    ((phase&&phase.checklist)||[]).forEach((item,i)=>{
      if(!cats[item.category])cats[item.category]=[];
      cats[item.category].push({...item,index:i});
    });
    return cats;
  },[phase]);

  // If not unlocked, show landing page (after all hooks)
  if(!unlocked){
    return <LandingPage onUnlock={()=>setUnlocked(true)}/>;
  }

  const fin=calcFinancials(deal);

  return(
    <div style={{display:"flex",height:"100vh",background:T.pageBg,overflow:"hidden"}}>
      {/* ═══ SIDEBAR ═══ */}
      <div style={{width:sidebarOpen?280:0,minWidth:sidebarOpen?280:0,background:T.sidebar,borderRight:"1px solid "+T.sidebarBorder,display:"flex",flexDirection:"column",overflow:"hidden",transition:"all 0.25s ease"}}>
        <div style={{padding:"20px 16px 8px"}}>
          <div style={{display:"flex",alignItems:"baseline",gap:0,marginBottom:2}}>
            <span style={{fontSize:13,fontWeight:400,letterSpacing:3,color:"#999",textTransform:"uppercase",marginRight:6}}>The</span>
            <span style={{fontSize:13,fontWeight:800,letterSpacing:1,color:T.text,textTransform:"uppercase",position:"relative",paddingBottom:6}}>Build Sheet<span style={{position:"absolute",bottom:0,left:0,display:"flex",gap:3}}><span style={{width:26,height:2,background:"#E8590C",borderRadius:1}}></span><span style={{width:14,height:2,background:"#E8590C",opacity:0.55,borderRadius:1}}></span><span style={{width:7,height:2,background:"#E8590C",opacity:0.25,borderRadius:1}}></span></span></span>
          </div>
          <div style={{fontSize:12,color:T.textTertiary,marginBottom:12}}>From dirt to done. Your deal, tracked.</div>

          {/* Deal switcher */}
          <div style={{padding:"8px 10px",background:T.bg,borderRadius:8,boxShadow:"0 0 0 1px "+T.border,marginBottom:10,cursor:"pointer"}} onClick={()=>setShowDealPicker(true)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              {editingDealName?(
                <input autoFocus value={currentDealState.name} onChange={e=>updateCurrentDeal(d=>({...d,name:e.target.value}))}
                  onBlur={()=>setEditingDealName(false)} onKeyDown={e=>{if(e.key==="Enter")setEditingDealName(false);}}
                  onClick={e=>e.stopPropagation()}
                  style={{fontSize:13,fontWeight:600,color:T.text,border:"none",background:"transparent",outline:"none",padding:0,width:"100%",fontFamily:"inherit"}}/>
              ):(
                <span style={{fontSize:13,fontWeight:600,color:T.text}} onDoubleClick={e=>{e.stopPropagation();setEditingDealName(true);}}>{currentDealState.name}</span>
              )}
              <span style={{fontSize:10,color:T.textTertiary,flexShrink:0,marginLeft:8}}>{allDeals.length} deal{allDeals.length!==1?"s":""} &#9662;</span>
            </div>
            {deal.propertyAddress&&<div style={{fontSize:11,color:T.textTertiary,marginTop:2}}>{deal.propertyAddress}{deal.propertyCity?" - "+deal.propertyCity:""}</div>}
          </div>

          {/* Overall progress */}
          <div style={{padding:"10px 12px",background:T.bg,borderRadius:8,boxShadow:"0 0 0 1px "+T.border,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:12,fontWeight:600,color:T.text}}>Your Build</span>
              <span style={{fontSize:12,fontWeight:600,color:T.accent}}>{overallPct}%</span>
            </div>
            <ProgressBar value={overallDone} max={overallTotal} color={T.accent}/>
            <div style={{fontSize:11,color:T.textTertiary,marginTop:4}}>{overallDone} of {overallTotal} moves made</div>
          </div>

          {/* View toggle */}
          <div style={{display:"flex",gap:2,background:T.inputBg,borderRadius:6,padding:2,marginBottom:8}}>
            {[{k:"phase",l:"Build"},{k:"timeline",l:"Roadmap"},{k:"summary",l:"The Numbers"}].map(v=>(
              <button key={v.k} onClick={()=>setView(v.k)} style={{
                flex:1,padding:"6px 0",borderRadius:4,border:"none",fontSize:12,fontWeight:500,cursor:"pointer",
                background:view===v.k?T.bg:"transparent",color:view===v.k?T.text:T.textTertiary,
                boxShadow:view===v.k?"0 1px 2px rgba(0,0,0,0.06)":"none",transition:"all 0.15s ease"
              }}>{v.l}</button>
            ))}
          </div>
        </div>

        {/* Phase list */}
        <div style={{flex:1,overflowY:"auto",padding:"0 8px 16px"}}>
          {PHASES.map((p,i)=>{
            const t=phaseTotals[p.id];
            const isActive=activePhase===p.id;
            const isDone=t.total>0&&t.done===t.total;
            return(
              <div key={p.id} onClick={()=>{setActivePhase(p.id);setView("phase");}} style={{
                display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:6,cursor:"pointer",
                background:isActive?"rgba(35,131,226,0.06)":"transparent",transition:"background 0.15s ease"
              }}>
                <div style={{
                  width:28,height:28,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:14,flexShrink:0,
                  background:isDone?T.greenBg:isActive?T.accentBg:T.inputBg,
                  color:isDone?T.green:undefined
                }}>
                  {isDone?<svg width="14" height="14" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke={T.green} strokeWidth="2" fill="none" strokeLinecap="round"/></svg>:p.icon}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:isActive?600:400,color:isActive?T.accent:T.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</div>
                  {t.total>0&&(
                    <div style={{marginTop:3}}>
                      <ProgressBar value={t.done} max={t.total} color={isDone?T.green:T.accent} height={2}/>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        <div style={{padding:"10px 16px",borderTop:"1px solid "+T.sidebarBorder,display:"flex",gap:6}}>
          <button onClick={()=>exportDeal(activeDealId)} style={{flex:1,padding:"6px 0",background:T.inputBg,border:"1px solid "+T.border,borderRadius:4,fontSize:11,cursor:"pointer",color:T.textSecondary}}>Export Deal</button>
          <button onClick={createDeal} style={{flex:1,padding:"6px 0",background:T.text,border:"none",borderRadius:4,fontSize:11,cursor:"pointer",color:"#fff",fontWeight:600}}>+ New Deal</button>
        </div>
        <div style={{padding:"4px 16px 10px",fontSize:10,color:T.textTertiary,lineHeight:1.5}}>
          Built by Matt McPheely for developers who do the work themselves.
        </div>
      </div>

      {/* ═══ MAIN ═══ */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Topbar */}
        <div style={{display:"flex",alignItems:"center",padding:"10px 24px",borderBottom:"1px solid "+T.border,background:T.bg,gap:12,flexShrink:0}}>
          <button onClick={()=>setSidebarOpen(!sidebarOpen)} style={{background:"none",border:"1px solid "+T.border,borderRadius:6,color:T.textSecondary,cursor:"pointer",padding:"5px 10px",fontSize:13}}>
            {sidebarOpen?"☰":"☰"}
          </button>
          <div style={{flex:1}}>
            <span style={{fontSize:11,color:T.textTertiary,textTransform:"uppercase",letterSpacing:"0.06em"}}>
              {view==="timeline"?"Project Roadmap":view==="summary"?"The Full Picture":"Step "+(phaseIdx+1)+" of "+PHASES.length}
            </span>
            {view==="phase"&&<h2 style={{fontSize:18,fontWeight:700,margin:0,color:T.text}}>{phase.icon} {phase.name}</h2>}
            {view==="timeline"&&<h2 style={{fontSize:18,fontWeight:700,margin:0,color:T.text}}>Project Timeline</h2>}
            {view==="summary"&&<h2 style={{fontSize:18,fontWeight:700,margin:0,color:T.text}}>Deal Summary & Financials</h2>}
          </div>
          {view==="phase"&&(
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{if(phaseIdx>0)setActivePhase(PHASES[phaseIdx-1].id);}} disabled={phaseIdx===0}
                style={{background:T.inputBg,border:"1px solid "+T.border,borderRadius:6,color:T.textSecondary,cursor:"pointer",padding:"6px 12px",fontSize:13,opacity:phaseIdx===0?0.4:1}}>
                ← Back
              </button>
              <button onClick={()=>{if(phaseIdx<PHASES.length-1)setActivePhase(PHASES[phaseIdx+1].id);}} disabled={phaseIdx===PHASES.length-1}
                style={{background:T.accent,border:"none",borderRadius:6,color:"#fff",cursor:"pointer",padding:"6px 14px",fontSize:13,fontWeight:600,opacity:phaseIdx===PHASES.length-1?0.4:1}}>
                Next →
              </button>
            </div>
          )}
        </div>

        {/* Content area */}
        <div ref={contentRef} style={{flex:1,overflowY:"auto",padding:"24px 32px 64px",maxWidth:860,width:"100%",margin:"0 auto"}}>

          {/* ═══ TIMELINE VIEW ═══ */}
          {view==="timeline"&&(
            <div>
              <div style={{background:T.bg,borderRadius:10,boxShadow:T.cardShadow,padding:"20px 24px",marginBottom:20}}>
                <GanttChart phases={PHASES} activePhase={activePhase} checked={checked} phaseTotals={phaseTotals} onClickPhase={id=>{setActivePhase(id);setView("phase");}}/>
              </div>
              <div style={{background:T.eduBg,border:"1px solid "+T.eduBorder,borderRadius:8,padding:"12px 16px",fontSize:13,color:T.textSecondary,lineHeight:1.6}}>
                <strong>How to read this:</strong> <span style={{color:T.red,fontWeight:600}}>CP</span> marks the critical path — the chain of phases that determines your total project timeline. Dashed bars are blocked by incomplete prerequisites. Phases overlap on purpose — your pro forma should be running from day one. Click any bar to jump in.
              </div>
            </div>
          )}

          {/* ═══ SUMMARY VIEW ═══ */}
          {view==="summary"&&(
            <div>
              {/* Deal info card */}
              <div style={{background:T.bg,borderRadius:10,boxShadow:T.cardShadow,padding:"20px 24px",marginBottom:20}}>
                <div style={{fontSize:12,fontWeight:600,color:T.textSecondary,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:12}}>The Deal at a Glance</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 24px"}}>
                  {[
                    ["Property",deal.propertyAddress],["City",deal.propertyCity],["Asset Type",deal.assetType],["Strategy",deal.targetStrategy],
                    ["Zoning",deal.currentZoning],["Lot Size",deal.lotSize],["Units",deal.unitCount],["Purchase Price",deal.purchasePrice?fmt(deal.purchasePrice):""],
                    ["Entity",deal.entityName],["Attorney",deal.attorney],["Architect",deal.architect],["GC",deal.gcName],
                    ["Lender",deal.lender],["Property Manager",deal.propertyManager]
                  ].filter(r=>r[1]).map(r=>(
                    <div key={r[0]} style={{padding:"6px 0",borderBottom:"1px solid "+T.borderLight}}>
                      <span style={{fontSize:11,color:T.textTertiary}}>{r[0]}: </span>
                      <span style={{fontSize:13,color:T.text,fontWeight:500}}>{r[1]}</span>
                    </div>
                  ))}
                </div>
              </div>
              <FinancialSummary deal={deal}/>
              {/* Phase completion */}
              <div style={{background:T.bg,borderRadius:10,boxShadow:T.cardShadow,padding:"20px 24px"}}>
                <div style={{fontSize:12,fontWeight:600,color:T.textSecondary,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:12}}>Where You Stand</div>
                {PHASES.map(p=>{
                  const t=phaseTotals[p.id];
                  if(t.total===0)return null;
                  const pctVal=Math.round((t.done/t.total)*100);
                  return(
                    <div key={p.id} style={{display:"flex",alignItems:"center",gap:12,padding:"6px 0"}}>
                      <span style={{width:180,fontSize:13,color:T.text}}>{p.icon} {p.name}</span>
                      <div style={{flex:1}}><ProgressBar value={t.done} max={t.total} color={pctVal===100?T.green:T.accent}/></div>
                      <span style={{fontSize:12,fontWeight:500,color:pctVal===100?T.green:T.textSecondary,width:36,textAlign:"right"}}>{pctVal}%</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* ═══ PHASE VIEW ═══ */}
          {view==="phase"&&(
            <div>
              {/* Summary card */}
              {(()=>{
                const depInfo=DEPS[phase.id]||{deps:[],parallel:[]};
                const status=getPhaseStatus(phase.id,phaseTotals,checked);
                const depPhases=depInfo.deps.map(d=>PHASES.find(x=>x.id===d)).filter(Boolean);
                const parPhases=depInfo.parallel.map(d=>PHASES.find(x=>x.id===d)).filter(Boolean);
                const isCritical=CRITICAL_PATH.includes(phase.id);
                return(
                  <div style={{marginBottom:16}}>
                    <div style={{background:T.bg,borderRadius:10,boxShadow:T.cardShadow,padding:"16px 20px",marginBottom:0}}>
                      <p style={{fontSize:15,color:T.text,lineHeight:1.65,margin:0}}>{phase.summary}</p>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:10}}>
                        <Tag color={T.textSecondary}>~{phase.weeks[0]}-{phase.weeks[1]} weeks</Tag>
                        {phaseTotals[phase.id].total>0&&<Tag color={T.accent} bg={T.accentBg}>{phaseTotals[phase.id].done}/{phaseTotals[phase.id].total} complete</Tag>}
                        {isCritical&&<Tag color={T.red} bg={T.redBg}>Critical Path</Tag>}
                        {status.status==="blocked"&&<Tag color={T.amber} bg={T.amberBg}>Blocked</Tag>}
                      </div>
                    </div>
                    {/* Dependency info bar */}
                    {(depPhases.length>0||parPhases.length>0)&&(
                      <div style={{background:T.pageBg,border:"1px solid "+T.border,borderTop:"none",borderRadius:"0 0 10px 10px",padding:"10px 20px",display:"flex",flexWrap:"wrap",gap:16,fontSize:12,color:T.textSecondary}}>
                        {depPhases.length>0&&(
                          <div style={{display:"flex",alignItems:"center",gap:4}}>
                            <span style={{fontWeight:600,color:T.textTertiary}}>Depends on:</span>
                            {depPhases.map(d=>{
                              const dt=phaseTotals[d.id];
                              const done=dt&&dt.total>0&&dt.done>=dt.total;
                              return <span key={d.id} onClick={()=>setActivePhase(d.id)} style={{cursor:"pointer",padding:"2px 8px",borderRadius:4,background:done?T.greenBg:T.amberBg,color:done?T.green:T.amber,fontWeight:500,fontSize:11}}>{d.icon} {d.name} {done?"Done":"Incomplete"}</span>;
                            })}
                          </div>
                        )}
                        {parPhases.length>0&&(
                          <div style={{display:"flex",alignItems:"center",gap:4}}>
                            <span style={{fontWeight:600,color:T.textTertiary}}>Runs with:</span>
                            {parPhases.map(d=><span key={d.id} onClick={()=>setActivePhase(d.id)} style={{cursor:"pointer",padding:"2px 8px",borderRadius:4,background:T.accentBg,color:T.accent,fontWeight:500,fontSize:11}}>{d.icon} {d.name}</span>)}
                          </div>
                        )}
                      </div>
                    )}
                    {/* Blocker warning */}
                    {status.status==="blocked"&&(
                      <div style={{background:T.redBg,border:"1px solid rgba(224,62,62,0.2)",borderRadius:8,padding:"10px 16px",marginTop:8,display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:16}}>&#9888;</span>
                        <span style={{fontSize:13,color:T.red,fontWeight:500}}>This phase is waiting on: {status.blockers.join(", ")}. Complete those first to unblock this work.</span>
                      </div>
                    )}
                  </div>
                );
              })()}

              {/* Education callout */}
              {phase.education&&(
                <div style={{background:T.eduBg,border:"1px solid "+T.eduBorder,borderRadius:8,padding:"14px 18px",marginBottom:16}}>
                  <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",color:T.amber,marginBottom:6}}>
                    💡 The Real Talk
                  </div>
                  <p style={{fontSize:13,color:T.textSecondary,lineHeight:1.65,margin:0}}>{phase.education}</p>
                </div>
              )}

              {/* Deal-specific fields */}
              {phase.dealFields&&phase.dealFields.length>0&&(
                <div style={{background:T.bg,borderRadius:10,boxShadow:T.cardShadow,padding:"16px 20px",marginBottom:16}}>
                  <div style={{fontSize:13,fontWeight:600,color:T.text,marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
                    <span style={{color:T.purple}}>🎯</span> Deal Information
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
                    {phase.dealFields.map(f=>(
                      <Field key={f.key} label={f.label} type={f.type} value={deal[f.key]} onChange={v=>updateDeal(f.key,v)} placeholder={f.placeholder} options={f.options}/>
                    ))}
                  </div>
                </div>
              )}

              {/* Financial fields */}
              {phase.financialFields&&phase.financialFields.length>0&&(
                <div style={{background:T.bg,borderRadius:10,boxShadow:T.cardShadow,padding:"16px 20px",marginBottom:16}}>
                  <div style={{fontSize:13,fontWeight:600,color:T.text,marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
                    <span style={{color:T.green}}>💲</span> Run the Numbers
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
                    {phase.financialFields.map(f=>(
                      <Field key={f.key} label={f.label} type={f.type} value={deal[f.key]} onChange={v=>updateDeal(f.key,v)} placeholder={f.placeholder} options={f.options}/>
                    ))}
                  </div>
                </div>
              )}

              {/* Auto-calculated financials */}
              {phase.calculations&&<FinancialSummary deal={deal}/>}

              {/* Phase progress */}
              {phaseTotals[phase.id].total>0&&(
                <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:T.bg,borderRadius:8,boxShadow:T.cardShadow,marginBottom:16}}>
                  <div style={{flex:1}}>
                    <ProgressBar value={phaseTotals[phase.id].done} max={phaseTotals[phase.id].total} color={phaseTotals[phase.id].done===phaseTotals[phase.id].total?T.green:T.accent} height={6}/>
                  </div>
                  <span style={{fontSize:13,fontWeight:600,color:T.text}}>{phaseTotals[phase.id].done}/{phaseTotals[phase.id].total}</span>
                </div>
              )}

              {/* Guide steps */}
              {phase.guide&&phase.guide.length>0&&(
                <div style={{background:T.bg,borderRadius:10,boxShadow:T.cardShadow,padding:"16px 20px",marginBottom:16}}>
                  <div style={{fontSize:13,fontWeight:600,color:T.text,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
                    <span style={{color:T.accent}}>→</span> The Moves
                  </div>
                  {phase.guide.map((step,i)=>{
                    const key=phase.id+"-guide-"+i;
                    return <Checkbox key={key} checked={!!checked[key]} onClick={()=>toggleCheck(key)} label={step}/>;
                  })}
                </div>
              )}

              {/* DD Checklist */}
              {phase.checklist.length>0&&(
                <div style={{background:T.bg,borderRadius:10,boxShadow:T.cardShadow,padding:"16px 20px",marginBottom:16}}>
                  <div style={{fontSize:13,fontWeight:600,color:T.text,marginBottom:4,display:"flex",alignItems:"center",gap:6}}>
                    <span style={{color:T.amber}}>☐</span> The Inspection Punch List
                  </div>
                  <p style={{fontSize:12,color:T.textTertiary,marginBottom:12,lineHeight:1.5}}>
                    Confirm each item before removing buyer contingencies.
                  </p>
                  {Object.entries(checklistCats).map(([cat,items])=>(
                    <div key={cat} style={{marginBottom:12}}>
                      <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",color:T.textTertiary,marginBottom:4,paddingLeft:2}}>{cat}</div>
                      {items.map(item=>{
                        const key=phase.id+"-"+item.index;
                        return(
                          <div key={key}>
                            <Checkbox checked={!!checked[key]} onClick={()=>toggleCheck(key)} label={item.item}/>
                            <input type="text" placeholder="Notes..." value={notes[key]||""} onChange={e=>updateNote(key,e.target.value)}
                              style={{width:"100%",border:"none",borderBottom:"1px solid "+T.borderLight,background:"transparent",fontSize:12,color:T.textSecondary,padding:"2px 0 4px 28px",outline:"none",marginBottom:4}}/>
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>
              )}

              {/* Phase notes */}
              <div style={{background:T.bg,borderRadius:10,boxShadow:T.cardShadow,padding:"16px 20px"}}>
                <div style={{fontSize:13,fontWeight:600,color:T.text,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
                  <span style={{color:T.textTertiary}}>✎</span> Field Notes
                </div>
                <textarea placeholder={"What you learned, what you need to find out, open threads for "+phase.name+"..."}
                  value={phaseNotes[phase.id]||""} onChange={e=>updatePhaseNote(phase.id,e.target.value)} rows={4}
                  style={{width:"100%",background:T.inputBg,border:"1px solid "+T.inputBorder,borderRadius:6,padding:"10px 12px",color:T.text,fontSize:14,lineHeight:1.6,resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
              </div>
            </div>
          )}
        </div>
      </div>
      {/* Deal picker modal */}
      {showDealPicker&&<DealPicker deals={allDeals} activeDealId={activeDealId}
        onSelect={id=>{setActiveDealId(id);setShowDealPicker(false);setActivePhase(PHASES[0].id);}}
        onNew={createDeal} onDelete={deleteDeal} onExport={exportDeal} onImport={importDeal}
        onClose={()=>setShowDealPicker(false)}/>}
    </div>
  );
}

class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(error){return{error};}
  render(){
    if(this.state.error)return React.createElement("div",{style:{padding:60,textAlign:"center",fontFamily:"Inter,system-ui,sans-serif",color:"#37352f"}},
      React.createElement("div",{style:{fontSize:24,fontWeight:700,marginBottom:8}},"Something went wrong"),
      React.createElement("div",{style:{fontSize:14,color:"#787774",marginBottom:24}},"Try refreshing the page. If the problem persists, clear your browser data for this site."),
      React.createElement("button",{onClick:function(){window.location.reload();},style:{padding:"10px 24px",background:"#37352f",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer"}},"Refresh"));
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
